<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="webrtcGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#webrtcGrad)"/>
  
  <!-- Title -->
  <text x="600" y="80" font-size="48" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial">
    WebRTC Peer-to-Peer
  </text>
  
  <!-- Peer 1 (Browser) -->
  <rect x="100" y="180" width="200" height="120" rx="10" fill="#1f2937" opacity="0.8" stroke="white" stroke-width="2"/>
  <text x="200" y="210" font-size="14" font-weight="bold" text-anchor="middle" fill="#60a5fa" font-family="Arial">Peer 1</text>
  <text x="200" y="235" font-size="11" text-anchor="middle" fill="white" font-family="Arial">Browser</text>
  <text x="200" y="255" font-size="10" text-anchor="middle" fill="#10b981" font-family="Arial">Camera & Mic</text>
  
  <!-- Signaling Server (center top) -->
  <rect x="500" y="80" width="200" height="80" rx="10" fill="#0369a1" opacity="0.9" stroke="white" stroke-width="2"/>
  <text x="600" y="115" font-size="14" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial">Signaling</text>
  <text x="600" y="135" font-size="12" text-anchor="middle" fill="white" font-family="Arial">Server</text>
  
  <!-- Peer 2 (Browser) -->
  <rect x="900" y="180" width="200" height="120" rx="10" fill="#1f2937" opacity="0.8" stroke="white" stroke-width="2"/>
  <text x="1000" y="210" font-size="14" font-weight="bold" text-anchor="middle" fill="#60a5fa" font-family="Arial">Peer 2</text>
  <text x="1000" y="235" font-size="11" text-anchor="middle" fill="white" font-family="Arial">Browser</text>
  <text x="1000" y="255" font-size="10" text-anchor="middle" fill="#10b981" font-family="Arial">Camera & Mic</text>
  
  <!-- Direct P2P Connection -->
  <line x1="300" y1="240" x2="900" y2="240" stroke="#10b981" stroke-width="4" marker-end="url(#arrowhead2)" opacity="0.6" stroke-dasharray="10,5"/>
  <text x="600" y="275" font-size="12" font-weight="bold" text-anchor="middle" fill="#10b981" font-family="Arial">Direct P2P Connection</text>
  
  <!-- Connection to signaling -->
  <line x1="300" y1="220" x2="520" y2="160" stroke="#60a5fa" stroke-width="2" opacity="0.7"/>
  <line x1="900" y1="220" x2="680" y2="160" stroke="#60a5fa" stroke-width="2" opacity="0.7"/>
  
  <defs>
    <marker id="arrowhead2" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#10b981" />
    </marker>
  </defs>
  
  <!-- STUN/TURN -->
  <rect x="450" y="380" width="300" height="80" rx="8" fill="#1f2937" opacity="0.8" stroke="#fbbf24" stroke-width="2"/>
  <text x="600" y="410" font-size="14" font-weight="bold" text-anchor="middle" fill="#fbbf24" font-family="Arial">STUN/TURN Servers</text>
  <text x="600" y="435" font-size="11" text-anchor="middle" fill="white" font-family="Arial">NAT Traversal & Ice Candidates</text>
  
  <!-- Features -->
  <rect x="100" y="380" width="250" height="80" rx="8" fill="#1f2937" opacity="0.8" stroke="#18b9c4" stroke-width="2"/>
  <text x="225" y="410" font-size="13" font-weight="bold" text-anchor="middle" fill="#18b9c4" font-family="Arial">MediaStream API</text>
  <text x="225" y="435" font-size="11" text-anchor="middle" fill="white" font-family="Arial">Audio & Video Stream</text>
  
  <rect x="850" y="380" width="250" height="80" rx="8" fill="#1f2937" opacity="0.8" stroke="#18b9c4" stroke-width="2"/>
  <text x="975" y="410" font-size="13" font-weight="bold" text-anchor="middle" fill="#18b9c4" font-family="Arial">RTCDataChannel</text>
  <text x="975" y="435" font-size="11" text-anchor="middle" fill="white" font-family="Arial">Low-latency Data</text>
</svg>