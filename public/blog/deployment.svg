<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="deployGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#deployGrad)"/>
  
  <!-- Title -->
  <text x="600" y="80" font-size="48" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial">
    Deployment & DevOps
  </text>
  
  <!-- Development -->
  <rect x="80" y="150" width="220" height="100" rx="10" fill="#1f2937" opacity="0.8" stroke="#60a5fa" stroke-width="2"/>
  <text x="190" y="185" font-size="14" font-weight="bold" text-anchor="middle" fill="#60a5fa" font-family="Arial">Development</text>
  <text x="190" y="215" font-size="11" text-anchor="middle" fill="white" font-family="Arial">Local Environment</text>
  
  <!-- Arrow 1 -->
  <line x1="300" y1="200" x2="360" y2="200" stroke="white" stroke-width="3" opacity="0.6"/>
  <polygon points="360,200 350,195 350,205" fill="white" opacity="0.6"/>
  
  <!-- Docker -->
  <rect x="380" y="150" width="220" height="100" rx="10" fill="#1f2937" opacity="0.8" stroke="#0ea5e9" stroke-width="2"/>
  <text x="490" y="185" font-size="14" font-weight="bold" text-anchor="middle" fill="#0ea5e9" font-family="Arial">Docker</text>
  <text x="490" y="215" font-size="11" text-anchor="middle" fill="white" font-family="Arial">Containerize App</text>
  
  <!-- Arrow 2 -->
  <line x1="600" y1="200" x2="660" y2="200" stroke="white" stroke-width="3" opacity="0.6"/>
  <polygon points="660,200 650,195 650,205" fill="white" opacity="0.6"/>
  
  <!-- CI/CD -->
  <rect x="680" y="150" width="220" height="100" rx="10" fill="#1f2937" opacity="0.8" stroke="#10b981" stroke-width="2"/>
  <text x="790" y="185" font-size="14" font-weight="bold" text-anchor="middle" fill="#10b981" font-family="Arial">CI/CD Pipeline</text>
  <text x="790" y="215" font-size="11" text-anchor="middle" fill="white" font-family="Arial">Test & Deploy</text>
  
  <!-- Arrow 3 -->
  <line x1="900" y1="200" x2="960" y2="200" stroke="white" stroke-width="3" opacity="0.6"/>
  <polygon points="960,200 950,195 950,205" fill="white" opacity="0.6"/>
  
  <!-- Production -->
  <rect x="980" y="150" width="220" height="100" rx="10" fill="#1f2937" opacity="0.8" stroke="#ec4899" stroke-width="2"/>
  <text x="1090" y="185" font-size="14" font-weight="bold" text-anchor="middle" fill="#ec4899" font-family="Arial">Production</text>
  <text x="1090" y="215" font-size="11" text-anchor="middle" fill="white" font-family="Arial">Live Environment</text>
  
  <!-- Platforms -->
  <text x="150" y="310" font-size="14" font-weight="bold" fill="#fbbf24" font-family="Arial">Hosting Platforms</text>
  
  <rect x="80" y="330" width="200" height="100" rx="8" fill="#0f172a" opacity="0.7" stroke="#06b6d4" stroke-width="2"/>
  <text x="180" y="360" font-size="12" font-weight="bold" text-anchor="middle" fill="#06b6d4" font-family="Arial">Vercel</text>
  <text x="180" y="385" font-size="10" text-anchor="middle" fill="white" font-family="Arial">Next.js Optimized</text>
  <text x="180" y="405" font-size="10" text-anchor="middle" fill="white" font-family="Arial">Serverless</text>
  
  <rect x="360" y="330" width="200" height="100" rx="8" fill="#0f172a" opacity="0.7" stroke="#10b981" stroke-width="2"/>
  <text x="460" y="360" font-size="12" font-weight="bold" text-anchor="middle" fill="#10b981" font-family="Arial">Netlify</text>
  <text x="460" y="385" font-size="10" text-anchor="middle" fill="white" font-family="Arial">Static & Serverless</text>
  <text x="460" y="405" font-size="10" text-anchor="middle" fill="white" font-family="Arial">Functions</text>
  
  <rect x="640" y="330" width="200" height="100" rx="8" fill="#0f172a" opacity="0.7" stroke="#f59e0b" stroke-width="2"/>
  <text x="740" y="360" font-size="12" font-weight="bold" text-anchor="middle" fill="#f59e0b" font-family="Arial">DigitalOcean</text>
  <text x="740" y="385" font-size="10" text-anchor="middle" fill="white" font-family="Arial">VPS & Apps</text>
  <text x="740" y="405" font-size="10" text-anchor="middle" fill="white" font-family="Arial">Full Control</text>
  
  <rect x="920" y="330" width="280" height="100" rx="8" fill="#0f172a" opacity="0.7" stroke="#ec4899" stroke-width="2"/>
  <text x="1060" y="360" font-size="12" font-weight="bold" text-anchor="middle" fill="#ec4899" font-family="Arial">Monitoring</text>
  <text x="1060" y="385" font-size="10" text-anchor="middle" fill="white" font-family="Arial">Sentry, Datadog</text>
  <text x="1060" y="405" font-size="10" text-anchor="middle" fill="white" font-family="Arial">Performance & Logging</text>
</svg>