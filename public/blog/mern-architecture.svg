<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4c1d95;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#be123c;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grad1)"/>
  
  <!-- Title -->
  <text x="600" y="80" font-size="48" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial">
    MERN Stack Architecture
  </text>
  
  <!-- Layer containers -->
  <!-- Frontend Layer -->
  <rect x="100" y="150" width="250" height="120" rx="10" fill="#fb923c" opacity="0.9"/>
  <text x="225" y="185" font-size="28" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial">React</text>
  <text x="225" y="220" font-size="14" text-anchor="middle" fill="white" font-family="Arial">Frontend UI</text>
  
  <!-- Backend Layer -->
  <rect x="475" y="150" width="250" height="120" rx="10" fill="#10b981" opacity="0.9"/>
  <text x="600" y="185" font-size="28" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial">Node.js</text>
  <text x="600" y="220" font-size="14" text-anchor="middle" fill="white" font-family="Arial">Backend API</text>
  
  <!-- Database Layer -->
  <rect x="850" y="150" width="250" height="120" rx="10" fill="#6366f1" opacity="0.9"/>
  <text x="975" y="185" font-size="28" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial">MongoDB</text>
  <text x="975" y="220" font-size="14" text-anchor="middle" fill="white" font-family="Arial">Database</text>
  
  <!-- Middleware representation -->
  <circle cx="225" cy="350" r="40" fill="url(#grad2)" opacity="0.8"/>
  <text x="225" y="360" font-size="12" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial">Express</text>
  
  <circle cx="600" cy="350" r="40" fill="url(#grad2)" opacity="0.8"/>
  <text x="600" y="360" font-size="12" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial">REST API</text>
  
  <circle cx="975" cy="350" r="40" fill="url(#grad2)" opacity="0.8"/>
  <text x="975" y="360" font-size="12" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial">Mongoose</text>
  
  <!-- Connecting lines -->
  <line x1="225" y1="270" x2="225" y2="310" stroke="white" stroke-width="3" opacity="0.6"/>
  <line x1="600" y1="270" x2="600" y2="310" stroke="white" stroke-width="3" opacity="0.6"/>
  <line x1="975" y1="270" x2="975" y2="310" stroke="white" stroke-width="3" opacity="0.6"/>
  
  <!-- Feature boxes -->
  <rect x="80" y="450" width="200" height="100" rx="8" fill="#1f2937" opacity="0.7" stroke="white" stroke-width="2"/>
  <text x="180" y="480" font-size="14" font-weight="bold" text-anchor="middle" fill="#fb923c" font-family="Arial">Performance</text>
  <text x="180" y="510" font-size="12" text-anchor="middle" fill="white" font-family="Arial">Optimized</text>
  <text x="180" y="535" font-size="12" text-anchor="middle" fill="white" font-family="Arial">Scalability</text>
  
  <rect x="500" y="450" width="200" height="100" rx="8" fill="#1f2937" opacity="0.7" stroke="white" stroke-width="2"/>
  <text x="600" y="480" font-size="14" font-weight="bold" text-anchor="middle" fill="#10b981" font-family="Arial">Real-time</text>
  <text x="600" y="510" font-size="12" text-anchor="middle" fill="white" font-family="Arial">WebSocket</text>
  <text x="600" y="535" font-size="12" text-anchor="middle" fill="white" font-family="Arial">Support</text>
  
  <rect x="920" y="450" width="200" height="100" rx="8" fill="#1f2937" opacity="0.7" stroke="white" stroke-width="2"/>
  <text x="1020" y="480" font-size="14" font-weight="bold" text-anchor="middle" fill="#6366f1" font-family="Arial">Scalable</text>
  <text x="1020" y="510" font-size="12" text-anchor="middle" fill="white" font-family="Arial">NoSQL</text>
  <text x="1020" y="535" font-size="12" text-anchor="middle" fill="white" font-family="Arial">Database</text>
</svg>