<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3178c6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#235a97;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#tsGrad)"/>
  
  <!-- Title -->
  <text x="600" y="80" font-size="48" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial">
    Advanced TypeScript Patterns
  </text>
  
  <!-- Generics box -->
  <rect x="80" y="150" width="280" height="140" rx="10" fill="#1f2937" opacity="0.8" stroke="#60a5fa" stroke-width="2"/>
  <text x="220" y="180" font-size="14" font-weight="bold" text-anchor="middle" fill="#60a5fa" font-family="Arial">Generics</text>
  <text x="220" y="210" font-size="10" text-anchor="middle" fill="white" font-family="monospace">&lt;T&gt;</text>
  <text x="220" y="235" font-size="11" text-anchor="middle" fill="white" font-family="Arial">Type</text>
  <text x="220" y="255" font-size="11" text-anchor="middle" fill="white" font-family="Arial">Reusability</text>
  
  <!-- Conditional Types box -->
  <rect x="460" y="150" width="280" height="140" rx="10" fill="#1f2937" opacity="0.8" stroke="#ec4899" stroke-width="2"/>
  <text x="600" y="180" font-size="14" font-weight="bold" text-anchor="middle" fill="#ec4899" font-family="Arial">Conditional</text>
  <text x="600" y="200" font-size="14" font-weight="bold" text-anchor="middle" fill="#ec4899" font-family="Arial">Types</text>
  <text x="600" y="230" font-size="11" text-anchor="middle" fill="white" font-family="monospace">T extends U</text>
  <text x="600" y="255" font-size="11" text-anchor="middle" fill="white" font-family="Arial">? X : Y</text>
  
  <!-- Utility Types box -->
  <rect x="840" y="150" width="280" height="140" rx="10" fill="#1f2937" opacity="0.8" stroke="#10b981" stroke-width="2"/>
  <text x="980" y="180" font-size="14" font-weight="bold" text-anchor="middle" fill="#10b981" font-family="Arial">Utility</text>
  <text x="980" y="200" font-size="14" font-weight="bold" text-anchor="middle" fill="#10b981" font-family="Arial">Types</text>
  <text x="980" y="230" font-size="11" text-anchor="middle" fill="white" font-family="monospace">Pick, Omit</text>
  <text x="980" y="255" font-size="11" text-anchor="middle" fill="white" font-family="Arial">Record, Partial</text>
  
  <!-- Type Guards box -->
  <rect x="80" y="350" width="280" height="140" rx="10" fill="#1f2937" opacity="0.8" stroke="#fbbf24" stroke-width="2"/>
  <text x="220" y="380" font-size="14" font-weight="bold" text-anchor="middle" fill="#fbbf24" font-family="Arial">Type Guards</text>
  <text x="220" y="410" font-size="11" text-anchor="middle" fill="white" font-family="monospace">is keyword</text>
  <text x="220" y="435" font-size="11" text-anchor="middle" fill="white" font-family="Arial">Runtime</text>
  <text x="220" y="455" font-size="11" text-anchor="middle" fill="white" font-family="Arial">Safety</text>
  
  <!-- Discriminated Unions box -->
  <rect x="460" y="350" width="280" height="140" rx="10" fill="#1f2937" opacity="0.8" stroke="#06b6d4" stroke-width="2"/>
  <text x="600" y="375" font-size="14" font-weight="bold" text-anchor="middle" fill="#06b6d4" font-family="Arial">Discriminated</text>
  <text x="600" y="395" font-size="14" font-weight="bold" text-anchor="middle" fill="#06b6d4" font-family="Arial">Unions</text>
  <text x="600" y="425" font-size="11" text-anchor="middle" fill="white" font-family="monospace">type | type</text>
  <text x="600" y="450" font-size="11" text-anchor="middle" fill="white" font-family="Arial">Pattern Match</text>
  
  <!-- Advanced Mechanics box -->
  <rect x="840" y="350" width="280" height="140" rx="10" fill="#1f2937" opacity="0.8" stroke="#8b5cf6" stroke-width="2"/>
  <text x="980" y="375" font-size="14" font-weight="bold" text-anchor="middle" fill="#8b5cf6" font-family="Arial">Mapped</text>
  <text x="980" y="395" font-size="14" font-weight="bold" text-anchor="middle" fill="#8b5cf6" font-family="Arial">Types</text>
  <text x="980" y="425" font-size="11" text-anchor="middle" fill="white" font-family="monospace">in keyof</text>
  <text x="980" y="450" font-size="11" text-anchor="middle" fill="white" font-family="Arial">Dynamic</text>
</svg>