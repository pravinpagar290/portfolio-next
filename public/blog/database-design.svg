<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="dbGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#dbGrad)"/>
  
  <!-- Title -->
  <text x="600" y="80" font-size="48" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial">
    Database Design
  </text>
  
  <!-- SQL Section -->
  <rect x="80" y="150" width="400" height="150" rx="12" fill="#1f2937" opacity="0.8" stroke="#60a5fa" stroke-width="2"/>
  <text x="280" y="180" font-size="18" font-weight="bold" text-anchor="middle" fill="#60a5fa" font-family="Arial">SQL Databases</text>
  
  <rect x="100" y="200" width="360" height="80" rx="5" fill="#0f172a" opacity="0.6"/>
  <text x="280" y="225" font-size="12" text-anchor="middle" fill="#60a5fa" font-family="monospace">PostgreSQL • MySQL</text>
  <text x="280" y="250" font-size="11" text-anchor="middle" fill="white" font-family="Arial">ACID Compliance, Complex Queries</text>
  <text x="280" y="270" font-size="11" text-anchor="middle" fill="white" font-family="Arial">Foreign Keys, Relationships</text>
  
  <!-- NoSQL Section -->
  <rect x="720" y="150" width="400" height="150" rx="12" fill="#1f2937" opacity="0.8" stroke="#f97316" stroke-width="2"/>
  <text x="920" y="180" font-size="18" font-weight="bold" text-anchor="middle" fill="#f97316" font-family="Arial">NoSQL Databases</text>
  
  <rect x="740" y="200" width="360" height="80" rx="5" fill="#0f172a" opacity="0.6"/>
  <text x="920" y="225" font-size="12" text-anchor="middle" fill="#f97316" font-family="monospace">MongoDB • Document-based</text>
  <text x="920" y="250" font-size="11" text-anchor="middle" fill="white" font-family="Arial">Flexible Schema, Horizontal Scaling</text>
  <text x="920" y="270" font-size="11" text-anchor="middle" fill="white" font-family="Arial">Rapid Development, Nested Data</text>
  
  <!-- Normalization Forms -->
  <text x="300" y="350" font-size="16" font-weight="bold" fill="#fbbf24" font-family="Arial">Normalization (1NF → 3NF)</text>
  
  <rect x="80" y="380" width="160" height="100" rx="8" fill="#0f172a" opacity="0.7" stroke="#fbbf24" stroke-width="2"/>
  <text x="160" y="410" font-size="12" font-weight="bold" text-anchor="middle" fill="#fbbf24" font-family="Arial">1NF</text>
  <text x="160" y="435" font-size="10" text-anchor="middle" fill="white" font-family="Arial">Atomic</text>
  <text x="160" y="455" font-size="10" text-anchor="middle" fill="white" font-family="Arial">Values</text>
  
  <rect x="320" y="380" width="160" height="100" rx="8" fill="#0f172a" opacity="0.7" stroke="#06b6d4" stroke-width="2"/>
  <text x="400" y="410" font-size="12" font-weight="bold" text-anchor="middle" fill="#06b6d4" font-family="Arial">2NF</text>
  <text x="400" y="435" font-size="10" text-anchor="middle" fill="white" font-family="Arial">Remove</text>
  <text x="400" y="455" font-size="10" text-anchor="middle" fill="white" font-family="Arial">Partial Deps</text>
  
  <rect x="560" y="380" width="160" height="100" rx="8" fill="#0f172a" opacity="0.7" stroke="#ec4899" stroke-width="2"/>
  <text x="640" y="410" font-size="12" font-weight="bold" text-anchor="middle" fill="#ec4899" font-family="Arial">3NF</text>
  <text x="640" y="435" font-size="10" text-anchor="middle" fill="white" font-family="Arial">Remove</text>
  <text x="640" y="455" font-size="10" text-anchor="middle" fill="white" font-family="Arial">Transitive</text>
  
  <!-- Indexing -->
  <rect x="840" y="380" width="280" height="100" rx="8" fill="#0f172a" opacity="0.7" stroke="#10b981" stroke-width="2"/>
  <text x="980" y="410" font-size="13" font-weight="bold" text-anchor="middle" fill="#10b981" font-family="Arial">Indexing Strategy</text>
  <text x="980" y="435" font-size="10" text-anchor="middle" fill="white" font-family="Arial">Query Performance</text>
  <text x="980" y="455" font-size="10" text-anchor="middle" fill="white" font-family="Arial">Primary, Composite, Full-text</text>
</svg>