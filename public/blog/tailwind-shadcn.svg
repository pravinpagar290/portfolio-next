<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tailwindGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0369a1;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#tailwindGrad)"/>
  
  <!-- Title -->
  <text x="600" y="80" font-size="48" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial">
    Tailwind CSS + shadcn/ui
  </text>
  
  <!-- Tailwind CSS -->
  <rect x="100" y="150" width="350" height="200" rx="15" fill="#1f2937" opacity="0.8" stroke="#06b6d4" stroke-width="3"/>
  <text x="275" y="190" font-size="18" font-weight="bold" text-anchor="middle" fill="#06b6d4" font-family="Arial">Tailwind CSS</text>
  
  <!-- Utility classes representation -->
  <rect x="130" y="220" width="90" height="40" rx="5" fill="#0f172a" stroke="#10b981" stroke-width="1"/>
  <text x="175" y="245" font-size="11" font-weight="bold" text-anchor="middle" fill="#10b981" font-family="monospace">px-4</text>
  
  <rect x="240" y="220" width="90" height="40" rx="5" fill="#0f172a" stroke="#10b981" stroke-width="1"/>
  <text x="285" y="245" font-size="11" font-weight="bold" text-anchor="middle" fill="#10b981" font-family="monospace">py-2</text>
  
  <rect x="130" y="280" width="90" height="40" rx="5" fill="#0f172a" stroke="#ec4899" stroke-width="1"/>
  <text x="175" y="305" font-size="11" font-weight="bold" text-anchor="middle" fill="#ec4899" font-family="monospace">hover:</text>
  
  <rect x="240" y="280" width="90" height="40" rx="5" fill="#0f172a" stroke="#ec4899" stroke-width="1"/>
  <text x="285" y="305" font-size="11" font-weight="bold" text-anchor="middle" fill="#ec4899" font-family="monospace">bg-accent</text>
  
  <!-- Connection arrow -->
  <line x1="450" y1="250" x2="550" y2="250" stroke="white" stroke-width="3" opacity="0.6"/>
  <polygon points="550,250 540,245 540,255" fill="white" opacity="0.6"/>
  
  <!-- shadcn/ui -->
  <rect x="750" y="150" width="350" height="200" rx="15" fill="#1f2937" opacity="0.8" stroke="#ec4899" stroke-width="3"/>
  <text x="925" y="190" font-size="18" font-weight="bold" text-anchor="middle" fill="#ec4899" font-family="Arial">shadcn/ui</text>
  
  <!-- Component examples -->
  <rect x="780" y="220" width="85" height="40" rx="5" fill="#1f2937" stroke="#fbbf24" stroke-width="2"/>
  <text x="822" y="245" font-size="11" font-weight="bold" text-anchor="middle" fill="#fbbf24" font-family="Arial">Button</text>
  
  <rect x="895" y="220" width="85" height="40" rx="5" fill="#1f2937" stroke="#fbbf24" stroke-width="2"/>
  <text x="937" y="245" font-size="11" font-weight="bold" text-anchor="middle" fill="#fbbf24" font-family="Arial">Card</text>
  
  <rect x="780" y="280" width="85" height="40" rx="5" fill="#1f2937" stroke="#8b5cf6" stroke-width="2"/>
  <text x="822" y="305" font-size="11" font-weight="bold" text-anchor="middle" fill="#8b5cf6" font-family="Arial">Dialog</text>
  
  <rect x="895" y="280" width="85" height="40" rx="5" fill="#1f2937" stroke="#8b5cf6" stroke-width="2"/>
  <text x="937" y="305" font-size="11" font-weight="bold" text-anchor="middle" fill="#8b5cf6" font-family="Arial">Input</text>
  
  <!-- Benefits at bottom -->
  <rect x="100" y="420" width="240" height="150" rx="10" fill="#0f172a" opacity="0.8" stroke="#10b981" stroke-width="2"/>
  <text x="220" y="455" font-size="13" font-weight="bold" text-anchor="middle" fill="#10b981" font-family="Arial">Utility-first</text>
  <text x="220" y="480" font-size="11" text-anchor="middle" fill="white" font-family="Arial">Highly customizable</text>
  <text x="220" y="505" font-size="11" text-anchor="middle" fill="white" font-family="Arial">Small bundle size</text>
  <text x="220" y="530" font-size="11" text-anchor="middle" fill="white" font-family="Arial">Dark mode support</text>
  
  <rect x="480" y="420" width="240" height="150" rx="10" fill="#0f172a" opacity="0.8" stroke="#06b6d4" stroke-width="2"/>
  <text x="600" y="455" font-size="13" font-weight="bold" text-anchor="middle" fill="#06b6d4" font-family="Arial">Unstyled</text>
  <text x="600" y="480" font-size="11" text-anchor="middle" fill="white" font-family="Arial">Full ownership</text>
  <text x="600" y="505" font-size="11" text-anchor="middle" fill="white" font-family="Arial">Accessible defaults</text>
  <text x="600" y="530" font-size="11" text-anchor="middle" fill="white" font-family="Arial">Copy & customize</text>
  
  <rect x="860" y="420" width="240" height="150" rx="10" fill="#0f172a" opacity="0.8" stroke="#ec4899" stroke-width="2"/>
  <text x="980" y="455" font-size="13" font-weight="bold" text-anchor="middle" fill="#ec4899" font-family="Arial">Design System</text>
  <text x="980" y="480" font-size="11" text-anchor="middle" fill="white" font-family="Arial">Consistent UI</text>
  <text x="980" y="505" font-size="11" text-anchor="middle" fill="white" font-family="Arial">Rapid development</text>
  <text x="980" y="530" font-size="11" text-anchor="middle" fill="white" font-family="Arial">Professional</text>
</svg>