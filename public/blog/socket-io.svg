<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="socketGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0369a1;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#socketGrad)"/>
  
  <!-- Title -->
  <text x="600" y="80" font-size="48" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial">
    Real-time with Socket.io
  </text>
  
  <!-- Client circles -->
  <circle cx="200" cy="250" r="50" fill="#f59e0b" opacity="0.9"/>
  <text x="200" y="260" font-size="14" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial">Client 1</text>
  
  <circle cx="200" cy="400" r="50" fill="#f59e0b" opacity="0.9"/>
  <text x="200" y="410" font-size="14" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial">Client 2</text>
  
  <!-- Server center -->
  <circle cx="600" cy="325" r="60" fill="#ec4899" opacity="1"/>
  <text x="600" y="320" font-size="16" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial">Socket.io</text>
  <text x="600" y="340" font-size="14" text-anchor="middle" fill="white" font-family="Arial">Server</text>
  
  <!-- Client circles right -->
  <circle cx="1000" cy="250" r="50" fill="#f59e0b" opacity="0.9"/>
  <text x="1000" y="260" font-size="14" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial">Client 3</text>
  
  <circle cx="1000" cy="400" r="50" fill="#f59e0b" opacity="0.9"/>
  <text x="1000" y="410" font-size="14" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial">Client 4</text>
  
  <!-- Bidirectional arrows -->
  <!-- Client 1 -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="white" />
    </marker>
  </defs>
  
  <!-- Arrows from clients to server -->
  <line x1="250" y1="250" x2="540" y2="300" stroke="white" stroke-width="3" marker-end="url(#arrowhead)" opacity="0.8"/>
  <line x1="250" y1="400" x2="540" y2="350" stroke="white" stroke-width="3" marker-end="url(#arrowhead)" opacity="0.8"/>
  <line x1="950" y1="250" x2="660" y2="300" stroke="white" stroke-width="3" marker-end="url(#arrowhead)" opacity="0.8"/>
  <line x1="950" y1="400" x2="660" y2="350" stroke="white" stroke-width="3" marker-end="url(#arrowhead)" opacity="0.8"/>
  
  <!-- Arrows from server to clients -->
  <line x1="540" y1="300" x2="250" y2="250" stroke="#10b981" stroke-width="3" marker-end="url(#arrowhead)" opacity="0.6" stroke-dasharray="5,5"/>
  <line x1="540" y1="350" x2="250" y2="400" stroke="#10b981" stroke-width="3" marker-end="url(#arrowhead)" opacity="0.6" stroke-dasharray="5,5"/>
  <line x1="660" y1="300" x2="950" y2="250" stroke="#10b981" stroke-width="3" marker-end="url(#arrowhead)" opacity="0.6" stroke-dasharray="5,5"/>
  <line x1="660" y1="350" x2="950" y2="400" stroke="#10b981" stroke-width="3" marker-end="url(#arrowhead)" opacity="0.6" stroke-dasharray="5,5"/>
  
  <!-- Features at bottom -->
  <rect x="150" y="520" width="200" height="80" rx="8" fill="#1f2937" opacity="0.7" stroke="white" stroke-width="2"/>
  <text x="250" y="545" font-size="12" font-weight="bold" text-anchor="middle" fill="#06b6d4" font-family="Arial">Bidirectional</text>
  <text x="250" y="565" font-size="11" text-anchor="middle" fill="white" font-family="Arial">Communication</text>
  
  <rect x="500" y="520" width="200" height="80" rx="8" fill="#1f2937" opacity="0.7" stroke="white" stroke-width="2"/>
  <text x="600" y="545" font-size="12" font-weight="bold" text-anchor="middle" fill="#ec4899" font-family="Arial">Event-driven</text>
  <text x="600" y="565" font-size="11" text-anchor="middle" fill="white" font-family="Arial">Architecture</text>
  
  <rect x="850" y="520" width="200" height="80" rx="8" fill="#1f2937" opacity="0.7" stroke="white" stroke-width="2"/>
  <text x="950" y="545" font-size="12" font-weight="bold" text-anchor="middle" fill="#10b981" font-family="Arial">Instant</text>
  <text x="950" y="565" font-size="11" text-anchor="middle" fill="white" font-family="Arial">Updates</text>
</svg>